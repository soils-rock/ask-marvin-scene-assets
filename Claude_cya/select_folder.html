<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Folder to Process</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        h1 {
            color: #4a9eff;
            margin-bottom: 20px;
        }
        
        .instructions {
            background: #2a4a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 40px;
            border-left: 4px solid #4a9eff;
            max-width: 600px;
        }
        
        .folder-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px;
            width: 100%;
        }
        
        .folder-button {
            background: #333;
            border: 2px solid #4a9eff;
            color: #e0e0e0;
            padding: 20px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        
        .folder-button:hover {
            background: #4a9eff;
            color: white;
            transform: translateX(10px);
        }
        
        .folder-name {
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        .folder-info {
            font-size: 14px;
            color: #aaa;
        }
        
        .no-folders {
            background: #3a2a2a;
            padding: 30px;
            border-radius: 8px;
            border-left: 4px solid #f92672;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🗂️ Select Folder to Process</h1>
    
    <div class="instructions">
        <h2 style="margin-bottom: 10px; color: #66d9ef;">Instructions:</h2>
        <ul style="margin-left: 20px;">
            <li>Select a folder to process its background images</li>
            <li>When finished, the folder will be marked complete (x prefix)</li>
            <li>Then return here to select the next folder</li>
        </ul>
    </div>
    
    <div class="folder-list">

        <button class="folder-button" onclick="selectFolder('Gravel Quarry')">
            <div class="folder-name">📁 Gravel Quarry</div>
            <div class="folder-info">5 images</div>
        </button>

        <button class="folder-button" onclick="selectFolder('near_VLA')">
            <div class="folder-name">📁 near_VLA</div>
            <div class="folder-info">3 images</div>
        </button>

    </div>
    
    <script>
        function selectFolder(folderName) {
            // Redirect to specific folder processor page
            window.location.href = 'process_' + folderName + '.html';
        }
    </script>
</body>
</html>
